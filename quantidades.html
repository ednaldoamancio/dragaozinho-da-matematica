<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragãozinho da Matemática — Reinos do Tesouro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Fredoka:wght@400;600;700&display=swap');

        :root{
            --night-top:#0a0f24;
            --night-mid:#192752;
            --night-bottom:#27356a;
            --parchment:#f6e8c8;
            --parchment-edge:#d9bd8c;
            --ink:#3a2c1d;
            --gold:#f5c64a;
            --gold-dark:#b9852f;
            --ember:#ff9255;
            --ember-dark:#e0512b;
            --scale:#3fae74;
            --scale-dark:#237a4f;
            --belly:#d3f5e0;
            --sack:#ad7a35;
            --sack-dark:#7c5420;
        }

        html, body { height: 100%; width: 100%; overflow: hidden; position: fixed; overscroll-behavior: none; }
        body { font-family: 'Fredoka', sans-serif; }
        .title-font { font-family: 'MedievalSharp', cursive; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .sky-bg { background: linear-gradient(to bottom, var(--night-top) 0%, var(--night-mid) 55%, var(--night-bottom) 100%); }

        .glow-title { text-shadow: 0 0 6px rgba(245,198,74,0.9), 0 0 18px rgba(224,81,43,0.55), 0 2px 0 rgba(0,0,0,0.3); }

        /* Stars */
        .star { position:absolute; background:#fff; border-radius:50%; animation: twinkle 3.4s ease-in-out infinite; }
        @keyframes twinkle { 0%,100% { opacity:.15; } 50% { opacity:1; } }

        /* Clouds */
        .cloud { position:absolute; background: rgba(255,255,255,0.06); border-radius: 50%; filter: blur(2px); animation: drift linear infinite; }
        @keyframes drift { from { transform: translateX(-20vw); } to { transform: translateX(120vw); } }

        /* Parchment cards / panels */
        .parchment-panel {
            background: linear-gradient(135deg, var(--parchment) 0%, var(--parchment-edge) 100%);
            border: 3px solid var(--gold-dark);
            color: var(--ink);
            box-shadow: 0 4px 0 rgba(0,0,0,0.35), inset 0 0 18px rgba(184,130,47,0.25);
        }

        /* Kingdom cards */
        .kingdom-card {
            background: linear-gradient(135deg, #4a5278 0%, #343b5e 100%);
            border: 2px solid var(--gold-dark);
            box-shadow: 0 3px 0 rgba(0,0,0,0.4);
            transition: transform 0.08s ease;
        }
        .kingdom-card:active { transform: scale(0.97) translateY(2px); }
        .kingdom-card.done { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(245,198,74,0.35), 0 3px 0 rgba(0,0,0,0.4); }

        /* Buttons */
        .btn-back {
            background: linear-gradient(135deg, #555f8a 0%, #3a4264 100%);
            border: 2px solid var(--gold-dark);
            color: var(--parchment);
        }
        .btn-back:active { transform: scale(0.95); }

        .key-btn {
            background: linear-gradient(135deg, #5b6390 0%, #3c4368 100%);
            border: 2px solid var(--gold-dark);
            color: var(--parchment);
            box-shadow: 0 2px 0 rgba(0,0,0,0.4);
            transition: transform 0.06s ease;
        }
        .key-btn:active { transform: scale(0.93) translateY(2px); box-shadow: 0 0 0 rgba(0,0,0,0.4); }

        .key-erase { background: linear-gradient(135deg, #c4583a 0%, #933520 100%); }
        .key-confirm { background: linear-gradient(135deg, #3fae74 0%, #1f6e46 100%); }

        /* Answer slots */
        .answer-slot {
            background: var(--parchment);
            border: 2px solid var(--gold-dark);
            color: var(--ink);
        }
        .shake { animation: shake 0.4s ease; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* Operators */
        .operator { color: var(--gold); }

        /* Item icon labels */
        .item-label { color: var(--parchment-edge); }

        /* Dragon */
        .dragon-wrap { animation: bob 3s ease-in-out infinite; transform-origin: center; }
        @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        .dragon-wrap.mood-thinking { animation: bob 3s ease-in-out infinite, tilt 1.6s ease-in-out infinite; }
        @keyframes tilt { 0%,100% { transform: rotate(-4deg); } 50% { transform: rotate(2deg); } }

        .wing { transform-origin: 95px 75px; }
        .mood-happy .wing-left { animation: flapL 0.35s ease-in-out infinite; }
        .mood-happy .wing-right { animation: flapR 0.35s ease-in-out infinite; }
        @keyframes flapL { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-18deg); } }
        @keyframes flapR { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(18deg); } }

        .flame { opacity: 0; transform-origin: 195px 95px; }
        .mood-happy .flame { opacity: 1; animation: flameOut 0.5s ease-in-out infinite; }
        @keyframes flameOut {
            0% { transform: scale(0.6); opacity: 0.6; }
            50% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(0.6); opacity: 0.6; }
        }

        /* Coin fall celebration */
        .coin-fall { position:absolute; top:-10%; animation: fall linear forwards; }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(115vh) rotate(420deg); opacity: 0.9; }
        }

        /* Pop in */
        .pop-in { animation: popIn 0.4s ease-out; }
        @keyframes popIn { 0% { transform: scale(0.4); opacity:0; } 70% { transform: scale(1.08); opacity:1; } 100% { transform: scale(1); } }

        .star-earned { animation: starPop 0.5s ease-out backwards; }
        @keyframes starPop { 0% { transform: scale(0) rotate(-40deg); opacity:0; } 70% { transform: scale(1.2) rotate(8deg); opacity:1; } 100% { transform: scale(1) rotate(0deg); } }

        /* SVG fills */
        .fill-gold { fill: var(--gold); }
        .fill-gold-dark { fill: var(--gold-dark); }
        .fill-scale { fill: var(--scale); }
        .fill-scale-dark { fill: var(--scale-dark); }
        .fill-belly { fill: var(--belly); }
        .fill-ink { fill: var(--ink); }
        .fill-parchment { fill: var(--parchment); }
        .fill-sack { fill: var(--sack); }
        .fill-sack-dark { fill: var(--sack-dark); }
        .fill-ember { fill: var(--ember); }
        .fill-ember-dark { fill: var(--ember-dark); }
    </style>
</head>
<body>
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        /* ---------- Audio helpers ---------- */
        let audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }
        function playTone(freq, duration = 0.18, type = 'sine', delay = 0, vol = 0.18) {
            try {
                const ctx = getAudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                osc.connect(gain);
                gain.connect(ctx.destination);
                const start = ctx.currentTime + delay;
                gain.gain.setValueAtTime(vol, start);
                gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
                osc.start(start);
                osc.stop(start + duration);
            } catch (e) { /* audio not available */ }
        }
        function playClick() { playTone(420, 0.07, 'square', 0, 0.07); }
        function playSuccess() {
            [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => playTone(f, 0.28, 'triangle', i * 0.12, 0.14));
        }
        function playRetry() { playTone(200, 0.3, 'sawtooth', 0, 0.09); }

        function speak(text) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'pt-BR';
            u.rate = 0.95;
            const voices = window.speechSynthesis.getVoices();
            const ptVoice = voices.find(v => v.lang === 'pt-BR') || voices.find(v => v.lang && v.lang.startsWith('pt'));
            if (ptVoice) u.voice = ptVoice;
            window.speechSynthesis.speak(u);
        }

        /* ---------- Game data ---------- */
        function decompose(num) {
            return {
                chests: Math.floor(num / 100),
                bags: Math.floor((num % 100) / 10),
                coins: num % 10
            };
        }

        const KINGDOMS = [
            { id: 1, name: "Vale das Moedas", desc: "Unidades", icon: "coin", numbers: [3, 5, 7, 9] },
            { id: 2, name: "Colina dos Sacos", desc: "Dezenas", icon: "bag", numbers: [10, 20, 30, 40] },
            { id: 3, name: "Vale dos Tesouros", desc: "Dezenas e Unidades", icon: "mix", numbers: [12, 25, 34, 47] },
            { id: 4, name: "Castelo dos Cofres", desc: "Centenas", icon: "chest", numbers: [100, 200, 300, 400] }
        ];

        /* ---------- Decorations ---------- */
        function Stars({ count = 40 }) {
            const stars = useMemo(() => Array.from({ length: count }, () => ({
                top: Math.random() * 65 + '%',
                left: Math.random() * 100 + '%',
                size: Math.random() * 2 + 1,
                delay: Math.random() * 4
            })), [count]);
            return (
                <div className="absolute inset-0 pointer-events-none overflow-hidden">
                    {stars.map((s, i) => (
                        <div key={i} className="star" style={{ top: s.top, left: s.left, width: s.size + 'px', height: s.size + 'px', animationDelay: s.delay + 's' }} />
                    ))}
                </div>
            );
        }

        function Clouds() {
            return (
                <div className="absolute inset-0 pointer-events-none overflow-hidden">
                    <div className="cloud" style={{ top: '8%', width: '120px', height: '30px', animationDuration: '70s' }} />
                    <div className="cloud" style={{ top: '16%', width: '90px', height: '22px', animationDuration: '95s', animationDelay: '-30s' }} />
                </div>
            );
        }

        function CastleSilhouette() {
            return (
                <svg className="absolute bottom-0 left-0 w-full pointer-events-none" viewBox="0 0 400 90" preserveAspectRatio="none" style={{ height: '14%' }}>
                    <path d="M0 90 V40 H20 V25 H35 V40 H60 V15 H75 V40 H110 V30 H125 V40 H160 V20 H175 V40 H210 V35 H225 V40 H260 V18 H275 V40 H310 V28 H325 V40 H360 V22 H375 V40 H400 V90 Z" fill="#060a18" opacity="0.85" />
                </svg>
            );
        }

        /* ---------- Treasure icons ---------- */
        function CoinIcon({ size = 44 }) {
            return (
                <svg width={size} height={size} viewBox="0 0 64 64">
                    <circle cx="32" cy="32" r="28" className="fill-gold" stroke="var(--gold-dark)" strokeWidth="3" />
                    <circle cx="32" cy="32" r="19" fill="none" stroke="var(--gold-dark)" strokeWidth="2" />
                    <path d="M32 18 L40 32 L32 46 L24 32 Z" className="fill-gold-dark" opacity="0.7" />
                </svg>
            );
        }

        function BagIcon({ size = 50 }) {
            return (
                <svg width={size} height={size} viewBox="0 0 64 64">
                    <path d="M20 26 Q14 26 14 38 Q14 56 32 58 Q50 56 50 38 Q50 26 44 26 Z" className="fill-sack" stroke="var(--sack-dark)" strokeWidth="2" />
                    <path d="M24 26 Q26 16 32 16 Q38 16 40 26 Z" className="fill-sack-dark" />
                    <rect x="26" y="14" width="12" height="5" rx="2" className="fill-gold-dark" />
                    <circle cx="32" cy="40" r="7" className="fill-gold" stroke="var(--gold-dark)" strokeWidth="1.5" />
                </svg>
            );
        }

        function ChestIcon({ size = 56 }) {
            return (
                <svg width={size} height={size} viewBox="0 0 64 64">
                    <rect x="8" y="30" width="48" height="24" rx="3" className="fill-sack" stroke="var(--sack-dark)" strokeWidth="2" />
                    <path d="M8 30 Q8 16 32 16 Q56 16 56 30 Z" className="fill-sack-dark" stroke="var(--gold-dark)" strokeWidth="2" />
                    <rect x="6" y="29" width="52" height="5" className="fill-gold-dark" />
                    <circle cx="32" cy="38" r="5" className="fill-ember" stroke="var(--gold-dark)" strokeWidth="1.5" />
                    <circle cx="14" cy="34" r="2" className="fill-gold" />
                    <circle cx="50" cy="34" r="2" className="fill-gold" />
                    <circle cx="14" cy="48" r="2" className="fill-gold" />
                    <circle cx="50" cy="48" r="2" className="fill-gold" />
                </svg>
            );
        }

        function kingdomIcon(icon, size) {
            if (icon === 'coin') return <CoinIcon size={size} />;
            if (icon === 'bag') return <BagIcon size={size} />;
            if (icon === 'chest') return <ChestIcon size={size} />;
            return <BagIcon size={size} />;
        }

        /* ---------- Dragon mascot ---------- */
        function Dragon({ mood = 'idle', size = 110 }) {
            const eyes = mood === 'sad'
                ? <path d="M165 80 Q172 86 179 80" stroke="var(--ink)" strokeWidth="3" fill="none" strokeLinecap="round" />
                : (
                    <g>
                        <circle cx="173" cy="78" r="9" fill="#fff" />
                        <circle cx={mood === 'thinking' ? 175 : 175} cy={mood === 'thinking' ? 74 : 78} r="4.5" className="fill-ink" />
                    </g>
                );

            const mouth = mood === 'sad'
                ? <path d="M182 100 Q190 94 198 100" stroke="var(--scale-dark)" strokeWidth="3" fill="none" strokeLinecap="round" />
                : <path d="M182 98 Q192 104 202 96" stroke="var(--scale-dark)" strokeWidth="3" fill="none" strokeLinecap="round" />;

            return (
                <div className={`dragon-wrap mood-${mood}`} style={{ width: size, height: size * (180 / 220) }}>
                    <svg viewBox="0 0 240 200" width="100%" height="100%">
                        <defs>
                            <radialGradient id="flameGrad" cx="30%" cy="50%" r="70%">
                                <stop offset="0%" stopColor="#fff4c2" />
                                <stop offset="45%" stopColor="var(--gold)" />
                                <stop offset="100%" stopColor="var(--ember-dark)" />
                            </radialGradient>
                        </defs>

                        {/* tail */}
                        <path d="M60 132 Q18 152 30 110 Q46 116 60 132 Z" className="fill-scale-dark" />

                        {/* wings */}
                        <path className="wing wing-left fill-scale-dark" d="M78 92 Q42 60 52 38 Q86 54 100 88 Z" />
                        <path className="wing wing-right fill-scale-dark" d="M148 92 Q184 60 174 38 Q140 54 126 88 Z" />

                        {/* body */}
                        <ellipse cx="112" cy="118" rx="58" ry="48" className="fill-scale" />
                        <ellipse cx="110" cy="134" rx="36" ry="28" className="fill-belly" />

                        {/* legs */}
                        <ellipse cx="86" cy="162" rx="15" ry="10" className="fill-scale-dark" />
                        <ellipse cx="138" cy="163" rx="15" ry="10" className="fill-scale-dark" />

                        {/* back spikes */}
                        <polygon points="92,72 100,56 108,72" className="fill-gold-dark" />
                        <polygon points="112,70 120,52 128,70" className="fill-gold-dark" />
                        <polygon points="132,74 140,60 148,74" className="fill-gold-dark" />

                        {/* head */}
                        <circle cx="168" cy="86" r="38" className="fill-scale" />
                        <ellipse cx="192" cy="98" rx="17" ry="13" className="fill-scale" />
                        <circle cx="200" cy="94" r="2.5" className="fill-scale-dark" />

                        {/* horns */}
                        <polygon points="152,56 158,34 165,58" className="fill-gold-dark" />
                        <polygon points="175,56 184,32 191,59" className="fill-gold-dark" />

                        {eyes}
                        {mouth}

                        {/* flame */}
                        <g className="flame">
                            <ellipse cx="214" cy="98" rx="16" ry="9" fill="url(#flameGrad)" />
                            <ellipse cx="226" cy="98" rx="9" ry="5.5" fill="#fff7c0" />
                        </g>
                    </svg>
                </div>
            );
        }

        /* ---------- Map screen ---------- */
        function KingdomCard({ kingdom, done, onClick }) {
            return (
                <button onClick={onClick} className="kingdom-card rounded-2xl px-3 py-2.5 flex items-center gap-3 w-full text-left">
                    <div className="flex-shrink-0">{kingdomIcon(kingdom.icon, 42)}</div>
                    <div className="flex-1 min-w-0">
                        <div className="title-font text-lg text-yellow-300 leading-tight truncate">{kingdom.name}</div>
                        <div className="text-xs text-indigo-200">{kingdom.desc}</div>
                    </div>
                    <div className="flex-shrink-0 text-xl">{done ? '⭐' : '▫️'}</div>
                </button>
            );
        }

        function MapScreen({ progress, onSelect }) {
            return (
                <div className="h-full w-full relative overflow-hidden sky-bg flex flex-col items-center px-4 pt-3 pb-3">
                    <Stars count={45} />
                    <Clouds />
                    <CastleSilhouette />

                    <h1 className="title-font glow-title text-2xl sm:text-3xl text-yellow-300 text-center mt-1 relative z-10">
                        Dragãozinho da Matemática
                    </h1>
                    <p className="text-indigo-200 text-sm mb-1 relative z-10">Reinos do Tesouro</p>

                    <div className="relative z-10">
                        <Dragon mood="idle" size={92} />
                    </div>

                    <div className="flex-1 w-full max-w-sm flex flex-col gap-2.5 justify-center relative z-10 overflow-y-auto no-scrollbar py-1">
                        {KINGDOMS.map(k => (
                            <KingdomCard key={k.id} kingdom={k} done={progress[k.id]} onClick={() => onSelect(k)} />
                        ))}
                    </div>

                    <p className="text-indigo-300/60 text-[11px] relative z-10">EdHumanas • Dragãozinho da Matemática</p>
                </div>
            );
        }

        /* ---------- Celebration overlay ---------- */
        function CelebrationOverlay({ number }) {
            const coins = useMemo(() => Array.from({ length: 16 }, () => ({
                left: Math.random() * 100 + '%',
                delay: Math.random() * 0.8,
                duration: 1.6 + Math.random() * 1.2,
                size: 22 + Math.random() * 18
            })), []);
            return (
                <div className="absolute inset-0 z-40 flex flex-col items-center justify-center bg-black/55 overflow-hidden">
                    {coins.map((c, i) => (
                        <div key={i} className="coin-fall" style={{ left: c.left, animationDelay: c.delay + 's', animationDuration: c.duration + 's' }}>
                            <CoinIcon size={c.size} />
                        </div>
                    ))}
                    <div className="pop-in flex flex-col items-center">
                        <Dragon mood="happy" size={140} />
                        <div className="title-font text-yellow-300 text-3xl mt-2 glow-title">Muito bem!</div>
                        <div className="title-font text-yellow-100 text-5xl mt-1">{number}</div>
                    </div>
                </div>
            );
        }

        /* ---------- Kingdom complete screen ---------- */
        function KingdomComplete({ kingdom, onBack }) {
            return (
                <div className="h-full w-full sky-bg relative overflow-hidden flex flex-col items-center justify-center px-6">
                    <Stars count={40} />
                    <div className="parchment-panel rounded-3xl p-6 flex flex-col items-center max-w-sm w-full pop-in relative z-10">
                        <Dragon mood="happy" size={120} />
                        <h2 className="title-font text-2xl text-center mt-2">Reino Conquistado!</h2>
                        <p className="text-center mt-1 mb-3">{kingdom.name}</p>
                        <div className="flex gap-2 mb-4">
                            {[0, 1, 2].map(i => (
                                <span key={i} className="star-earned text-3xl" style={{ animationDelay: (i * 0.18) + 's' }}>⭐</span>
                            ))}
                        </div>
                        <button onClick={onBack} className="key-confirm key-btn rounded-2xl px-6 py-3 font-bold text-lg w-full">
                            Voltar ao Mapa
                        </button>
                    </div>
                </div>
            );
        }

        /* ---------- Game level ---------- */
        function GameLevel({ kingdom, onBack, onComplete }) {
            const [round, setRound] = useState(0);
            const [typed, setTyped] = useState("");
            const [status, setStatus] = useState("idle"); // idle | correct | retry | finished

            const total = kingdom.numbers.length;
            const target = kingdom.numbers[round];
            const targetStr = target.toString();

            useEffect(() => {
                setTyped("");
                setStatus("idle");
            }, [round]);

            const { chests, bags, coins } = decompose(target);
            const items = [];
            for (let i = 0; i < chests; i++) items.push({ type: 'chest', value: 100 });
            for (let i = 0; i < bags; i++) items.push({ type: 'bag', value: 10 });
            for (let i = 0; i < coins; i++) items.push({ type: 'coin', value: 1 });

            const handleDigit = (n) => {
                if (status !== 'idle') return;
                if (typed.length >= targetStr.length) return;
                playClick();
                const newTyped = typed + n;
                setTyped(newTyped);
                speak(n.toString());
            };

            const handleErase = () => {
                if (status !== 'idle') return;
                if (!typed) return;
                playClick();
                setTyped(typed.slice(0, -1));
            };

            const handleConfirm = () => {
                if (status !== 'idle' || typed === '') return;
                if (parseInt(typed, 10) === target) {
                    setStatus('correct');
                    playSuccess();
                    speak(`Isso! ${target}!`);
                    setTimeout(() => {
                        if (round + 1 < total) {
                            setRound(round + 1);
                        } else {
                            onComplete();
                            setStatus('finished');
                        }
                    }, 2200);
                } else {
                    setStatus('retry');
                    playRetry();
                    speak('Quase! Vamos tentar de novo.');
                    setTimeout(() => {
                        setTyped('');
                        setStatus('idle');
                    }, 1100);
                }
            };

            const itemIcon = (type) => {
                if (type === 'chest') return <ChestIcon size={56} />;
                if (type === 'bag') return <BagIcon size={48} />;
                return <CoinIcon size={40} />;
            };

            if (status === 'finished') {
                return <KingdomComplete kingdom={kingdom} onBack={onBack} />;
            }

            return (
                <div className="h-full w-full sky-bg relative overflow-hidden flex flex-col">
                    <Stars count={20} />
                    <Clouds />

                    {/* top bar */}
                    <div className="flex items-center justify-between px-3 pt-3 relative z-10">
                        <button onClick={onBack} className="btn-back rounded-xl px-3 py-1.5 text-sm font-semibold">
                            ← Mapa
                        </button>
                        <div className="title-font text-yellow-300 text-base sm:text-lg text-center truncate px-2">
                            {kingdom.name}
                        </div>
                        <div className="text-indigo-200 text-sm font-semibold whitespace-nowrap">
                            {round + 1}/{total}
                        </div>
                    </div>

                    {/* play area */}
                    <div className="flex-1 flex flex-col items-center justify-center gap-3 px-3 relative z-10 overflow-y-auto no-scrollbar">
                        <Dragon mood={status === 'retry' ? 'sad' : status === 'correct' ? 'happy' : 'idle'} size={90} />

                        <div className="flex flex-wrap items-center justify-center gap-2 max-w-md">
                            {items.map((item, i) => (
                                <React.Fragment key={i}>
                                    <div
                                        onMouseEnter={() => speak(item.value.toString())}
                                        onClick={() => speak(item.value.toString())}
                                        className="flex flex-col items-center cursor-pointer"
                                    >
                                        {itemIcon(item.type)}
                                        <span className="item-label text-[10px] mt-0.5">{item.value}</span>
                                    </div>
                                    {i < items.length - 1 && (
                                        <span
                                            onMouseEnter={() => speak("mais")}
                                            onClick={() => speak("mais")}
                                            className="operator text-3xl font-bold cursor-pointer"
                                        >+</span>
                                    )}
                                </React.Fragment>
                            ))}
                            <span
                                onMouseEnter={() => speak("é igual a")}
                                onClick={() => speak("é igual a")}
                                className="operator text-3xl font-bold cursor-pointer ml-1"
                            >=</span>
                            <div className={`flex gap-1 ${status === 'retry' ? 'shake' : ''}`}>
                                {Array.from({ length: targetStr.length }).map((_, i) => (
                                    <div key={i} className="answer-slot w-10 h-12 sm:w-12 sm:h-14 rounded-lg flex items-center justify-center text-2xl font-bold">
                                        {typed[i] || ''}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* keypad */}
                    <div className="grid grid-cols-5 gap-1.5 p-2 relative z-10">
                        {[1, 2, 3, 4, 5, 6, 7, 8, 9, 0].map(n => (
                            <button key={n} onClick={() => handleDigit(n)} className="key-btn py-3.5 rounded-xl text-2xl font-bold">
                                {n}
                            </button>
                        ))}
                        <button onClick={handleErase} className="key-erase key-btn col-span-2 rounded-xl font-bold text-lg">
                            ⌫ Apagar
                        </button>
                        <button onClick={handleConfirm} className="key-confirm key-btn col-span-3 rounded-xl font-bold text-lg">
                            🛡️ Confirmar
                        </button>
                    </div>

                    {status === 'correct' && <CelebrationOverlay number={target} />}
                </div>
            );
        }

        /* ---------- App ---------- */
        function App() {
            const [screen, setScreen] = useState('map');
            const [kingdom, setKingdom] = useState(null);
            const [progress, setProgress] = useState(() => {
                try {
                    return JSON.parse(localStorage.getItem('dragaozinhoMatProgress')) || {};
                } catch (e) {
                    return {};
                }
            });

            const handleComplete = () => {
                if (!kingdom) return;
                const updated = { ...progress, [kingdom.id]: true };
                setProgress(updated);
                try { localStorage.setItem('dragaozinhoMatProgress', JSON.stringify(updated)); } catch (e) {}
            };

            if (screen === 'map') {
                return (
                    <MapScreen
                        progress={progress}
                        onSelect={(k) => { setKingdom(k); setScreen('game'); }}
                    />
                );
            }

            return (
                <GameLevel
                    kingdom={kingdom}
                    onBack={() => setScreen('map')}
                    onComplete={handleComplete}
                />
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
