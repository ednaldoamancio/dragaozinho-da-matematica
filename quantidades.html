<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragãozinho da Matemática — Reinos do Tesouro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Fredoka:wght@400;600;700&display=swap');
        :root { --night-top:#0a0f24; --night-mid:#192752; --night-bottom:#27356a; --parchment:#f6e8c8; --gold-dark:#b9852f; }
        html, body { height: 100%; width: 100%; overflow: hidden; position: fixed; }
        body { font-family: 'Fredoka', sans-serif; }
        .title-font { font-family: 'MedievalSharp', cursive; }
        .sky-bg { background: linear-gradient(to bottom, var(--night-top), var(--night-bottom)); }
        .glow-title { text-shadow: 0 0 10px rgba(245,198,74,0.8); }
    </style>
</head>
<body>
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [soundOn, setSoundOn] = useState(true);
            const [isFullscreen, setIsFullscreen] = useState(false);

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(e => console.log(e));
                    setIsFullscreen(true);
                } else {
                    document.exitFullscreen();
                    setIsFullscreen(false);
                }
            };

            return (
                <div className="h-full w-full sky-bg flex flex-col items-center p-4 text-white relative">
                    {/* Controles de Sistema */}
                    <div className="absolute top-4 right-4 flex gap-3 z-50">
                        <button 
                            onClick={() => setSoundOn(!soundOn)}
                            className="bg-indigo-900/80 p-3 rounded-full border-2 border-yellow-600 hover:bg-indigo-800 transition"
                        >
                            {soundOn ? "🔊" : "🔇"}
                        </button>
                        <button 
                            onClick={toggleFullscreen}
                            className="bg-indigo-900/80 p-3 rounded-full border-2 border-yellow-600 hover:bg-indigo-800 transition"
                        >
                            {isFullscreen ? "🗜️" : "🖥️"}
                        </button>
                    </div>

                    <h1 className="title-font glow-title text-4xl text-yellow-300 mt-8">Dragãozinho da Matemática</h1>
                    
                    {/* Dragão substituído pelo GIF */}
                    <div className="my-8 animate-bounce">
                        <img 
                            src="dragao1.gif" 
                            alt="Dragãozinho" 
                            className="w-40 h-40 object-contain drop-shadow-2xl"
                            onError={(e) => { e.target.src = 'https://cdn-icons-png.flaticon.com/512/3069/3069176.png'; }}
                        />
                    </div>

                    <div className="grid grid-cols-1 gap-4 w-full max-w-sm">
                        <button className="bg-emerald-700 p-4 rounded-xl border-b-4 border-emerald-900 font-bold hover:scale-105 transition">
                            ⚔️ Iniciar Aventura
                        </button>
                        <button className="bg-indigo-700 p-4 rounded-xl border-b-4 border-indigo-900 font-bold hover:scale-105 transition">
                            📜 Ver Reinos
                        </button>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
