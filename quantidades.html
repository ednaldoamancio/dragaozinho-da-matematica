<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragãozinho da Matemática — Reinos do Tesouro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Fredoka:wght@400;600;700&display=swap');
        body { font-family: 'Fredoka', sans-serif; height: 100vh; overflow: hidden; }
        .sky-bg { background: linear-gradient(to bottom, #0a0f24, #27356a); }
    </style>
</head>
<body>
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [screen, setScreen] = useState('menu'); // menu, map, game
            const [soundOn, setSoundOn] = useState(true);
            const [isFullscreen, setIsFullscreen] = useState(false);

            const toggleFullscreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                    setIsFullscreen(true);
                } else {
                    document.exitFullscreen();
                    setIsFullscreen(false);
                }
            };

            // Tela de Menu Principal
            if (screen === 'menu') {
                return (
                    <div className="h-full w-full sky-bg flex flex-col items-center justify-center text-white p-4">
                        {/* Controles Globais */}
                        <div className="absolute top-4 right-4 flex gap-3">
                            <button onClick={() => setSoundOn(!soundOn)} className="bg-indigo-900/80 p-3 rounded-full border border-yellow-600">
                                {soundOn ? "🔊" : "🔇"}
                            </button>
                            <button onClick={toggleFullscreen} className="bg-indigo-900/80 p-3 rounded-full border border-yellow-600">
                                {isFullscreen ? "🗜️" : "🖥️"}
                            </button>
                        </div>

                        <h1 className="text-4xl text-yellow-300 font-bold mb-8 text-center">Dragãozinho da Matemática</h1>
                        
                        {/* Dragão GIF */}
                        <img src="dragao1.gif" alt="Dragão" className="w-48 h-48 mb-8 object-contain" />

                        <div className="flex flex-col gap-4 w-full max-w-xs">
                            <button onClick={() => setScreen('map')} className="bg-emerald-600 py-4 rounded-xl font-bold text-lg hover:bg-emerald-500 transition">
                                Iniciar Aventura
                            </button>
                            <button onClick={() => setScreen('map')} className="bg-indigo-600 py-4 rounded-xl font-bold text-lg hover:bg-indigo-500 transition">
                                Ver Reinos
                            </button>
                        </div>
                    </div>
                );
            }

            // Simulação simples da transição para a tela de mapa
            return (
                <div className="h-full w-full sky-bg flex flex-col items-center justify-center text-white p-6">
                    <h2 className="text-2xl mb-6">Mapa dos Reinos</h2>
                    <p className="mb-8">Bem-vindo à jornada! Escolha um desafio.</p>
                    <button onClick={() => setScreen('menu')} className="bg-red-600 px-6 py-2 rounded-lg">
                        Voltar ao Menu
                    </button>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
