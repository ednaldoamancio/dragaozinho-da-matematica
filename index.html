<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0f24">
    <title>🐉 Dragãozinho da Matemática - Trilha dos Números</title>
    
    <!-- Ícones e Manifesto Corrigidos -->
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Nunito:wght@400;600;700;800;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --ouro-real: #d4a843;
            --ouro-escuro: #b8860b;
            --roxo-magia: #6b2d8e;
            --verde-dragao: #2d8e5f;
            --verde-escuro: #1a5c3a;
            --dourado-branco: #fff8f0;
            --noite-top: #0a0f24;
            --noite-mid: #192752;
            --noite-bottom: #27356a;
            --fogo: #ff6b35;
            --fogo-escuro: #e05a2a;
            --erro: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(180deg, var(--noite-top) 0%, var(--noite-mid) 55%, var(--noite-bottom) 100%);
            color: var(--dourado-branco);
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* [RESTANTE DO SEU CSS PERMANECE IGUAL...] */
        /* Certifique-se de manter as classes .assistivo, .keypad-btn, etc. */
        
        .keypad-container { 
            flex-shrink: 0; 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 8px; 
            padding: 8px 10px 15px 10px; 
            background: rgba(0,0,0,0.7); 
            border-top: 2px solid var(--ouro-real); 
        }

        .keypad-btn.btn-apagar { 
            grid-column: span 5; 
            background: linear-gradient(135deg, #e74c3c, #c0392b); 
            color: white; 
            font-size: clamp(16px, 4vw, 22px);
            padding: 12px;
        }
        /* ... */
    </style>
</head>
<body>
    <!-- [MANTENHA A ESTRUTURA HTML E O SCRIPT QUE VOCÊ JÁ TINHA...] -->
    <!-- Dica: O código JS está correto, apenas garanta que os arquivos .mp4 e .ogg estejam no mesmo caminho no GitHub -->
</body>
</html>
