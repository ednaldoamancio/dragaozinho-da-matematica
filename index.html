<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragãozinho da Matemática</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        body { font-family: 'Fredoka', sans-serif; background: #0f172a; }
        .gradient-text { background: linear-gradient(to right, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        function Menu() {
            return (
                <div className="h-screen w-full flex flex-col items-center justify-center bg-gradient-to-b from-indigo-950 to-slate-900 p-6 text-center">
                    <div className="mb-10 animate-bounce">
                        <span className="text-8xl">🐲</span>
                    </div>
                    
                    <h1 className="text-5xl md:text-6xl font-bold gradient-text mb-12 drop-shadow-lg">
                        Dragãozinho<br/>da Matemática
                    </h1>

                    <div className="grid grid-cols-1 gap-6 w-full max-w-sm">
                        {/* Jogo 1: Sequência Numérica */}
                        <a href="index.html" className="bg-blue-600 hover:bg-blue-500 text-white p-6 rounded-3xl text-2xl font-bold shadow-xl transition-transform hover:scale-105 border-b-8 border-blue-800">
                            Sequência Numérica
                        </a>

                        {/* Jogo 2: Quantidades */}
                        <a href="quantidades.html" className="bg-emerald-600 hover:bg-emerald-500 text-white p-6 rounded-3xl text-2xl font-bold shadow-xl transition-transform hover:scale-105 border-b-8 border-emerald-800">
                            Quantidades e Dezenas
                        </a>
                    </div>
                    
                    <p className="mt-12 text-slate-400">Escolha um jogo para começar!</p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Menu />);
    </script>
</body>
</html>
