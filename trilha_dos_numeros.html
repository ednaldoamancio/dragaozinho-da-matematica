<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>🐉 Dragãozinho da Matemática - Trilha dos Números</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Nunito:wght@400;600;700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --ouro-real: #d4a843;
            --ouro-escuro: #b8860b;
            --roxo-magia: #6b2d8e;
            --verde-dragao: #2d8e5f;
            --verde-escuro: #1a5c3a;
            --dourado-branco: #fff8f0;
            --noite-top: #0a0f24;
            --noite-mid: #192752;
            --noite-bottom: #27356a;
            --fogo: #ff6b35;
            --fogo-escuro: #e05a2a;
            --tesouro: #f5c64a;
            --tesouro-escuro: #b9852f;
            --coral: #f4845f;
            --turquoise: #4dd0e1;
            --lavender: #b39ddb;
            --lime: #aed581;
            --peach: #ffab91;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(180deg, var(--noite-top) 0%, var(--noite-mid) 55%, var(--noite-bottom) 100%);
            color: var(--dourado-branco);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Estrelas cintilantes */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(2px 2px at 15% 25%, #fff, transparent),
                radial-gradient(2px 2px at 35% 55%, rgba(255,200,100,0.8), transparent),
                radial-gradient(1px 1px at 55% 15%, #fff, transparent),
                radial-gradient(2px 2px at 75% 45%, rgba(255,180,100,0.6), transparent),
                radial-gradient(1px 1px at 85% 75%, #fff, transparent),
                radial-gradient(2px 2px at 25% 85%, rgba(255,200,100,0.7), transparent),
                radial-gradient(1px 1px at 65% 95%, #fff, transparent),
                radial-gradient(2px 2px at 45% 35%, rgba(255,180,100,0.5), transparent),
                radial-gradient(1px 1px at 95% 35%, #fff, transparent),
                radial-gradient(2px 2px at 5% 65%, rgba(255,200,100,0.6), transparent);
            background-size: 100% 100%;
            animation: cintilarEstrelas 3s ease-in-out infinite alternate;
        }

        @keyframes cintilarEstrelas {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Elementos flutuantes */
        .elemento-flutuante {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            animation: flutuarElemento linear infinite;
            opacity: 0.4;
        }
        
        @keyframes flutuarElemento {
            0% { transform: translateY(100vh) scale(0.5) rotate(0deg); opacity: 0; }
            15% { opacity: 0.6; }
            85% { opacity: 0.6; }
            100% { transform: translateY(-20vh) scale(1) rotate(360deg); opacity: 0; }
        }

        .header {
            position: relative;
            z-index: 50;
            background: linear-gradient(180deg, rgba(10,15,36,0.95) 0%, rgba(10,15,36,0.8) 100%);
            border-bottom: 2px solid var(--ouro-real);
            backdrop-filter: blur(10px);
        }
        
        .header-inner {
            max-width: 1000px;
            margin: 0 auto;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header-botoes { display: flex; gap: 10px; align-items: center; }

        .btn-fullscreen {
            background: linear-gradient(135deg, #4a148c, #6a1b9a);
            border: 2px solid var(--ouro-real);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(212, 168, 67, 0.3);
            color: white;
        }
        
        .btn-fullscreen:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(212, 168, 67, 0.5);
            background: linear-gradient(135deg, #6a1b9a, #8e24aa);
        }
        
        .btn-fullscreen.ativo {
            background: linear-gradient(135deg, var(--ouro-real), var(--ouro-escuro));
            box-shadow: 0 0 20px rgba(212, 168, 67, 0.6);
        }

        .btn-musica {
            background: linear-gradient(135deg, var(--verde-dragao), var(--verde-escuro));
            border: 2px solid var(--ouro-real);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(212, 168, 67, 0.3);
            color: white;
        }
        
        .btn-musica:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(212, 168, 67, 0.5);
        }
        
        .btn-musica.ativo {
            background: linear-gradient(135deg, var(--ouro-real), var(--ouro-escuro));
        }

        .btn-voltar-dourado {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--ouro-real), var(--ouro-escuro));
            border: 2px solid #fff;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 800;
            font-family: 'Nunito', sans-serif;
            color: #1a0a2e;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(212, 168, 67, 0.4);
            animation: brilhoDourado 1.5s ease-in-out infinite;
        }
        
        .btn-voltar-dourado:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(212, 168, 67, 0.8);
            background: linear-gradient(135deg, #e8c060, var(--ouro-real));
        }
        
        @keyframes brilhoDourado {
            0%, 100% { box-shadow: 0 0 15px rgba(212, 168, 67, 0.4); border-color: #fff; }
            50% { box-shadow: 0 0 30px rgba(212, 168, 67, 0.8); border-color: #ffe6a3; }
        }

        /* Container principal */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Títulos */
        .titulo-reino {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(24px, 6vw, 36px);
            color: var(--ouro-real);
            text-shadow: 0 0 15px rgba(245,198,74,0.5), 2px 2px 4px rgba(0,0,0,0.5);
            text-align: center;
            margin-bottom: 5px;
        }
        
        .subtitulo-magico {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(16px, 4vw, 20px);
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            margin-bottom: 30px;
        }

        /* Grid das fases */
        .fases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .card-fase {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 20px;
            border: 2px solid var(--ouro-real);
            padding: 25px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .card-fase::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .card-fase:hover::before { opacity: 1; }
        .card-fase:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }
        
        .emoji-fase {
            font-size: 48px;
            display: block;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            transition: transform 0.3s;
        }
        
        .card-fase:hover .emoji-fase {
            transform: scale(1.15) rotate(-5deg);
        }
        
        .numero-fase {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 24px;
            color: var(--ouro-real);
            margin-bottom: 10px;
        }
        
        .range-fase {
            font-size: 18px;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            margin-top: 10px;
        }
        
        .badge-desafio {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--fogo);
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 50px;
            text-transform: uppercase;
        }

        /* Área do jogo */
        .game-area {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 100;
            background: linear-gradient(180deg, var(--noite-top) 0%, var(--noite-mid) 55%, var(--noite-bottom) 100%);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        
        .game-header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: linear-gradient(180deg, rgba(10,15,36,0.95) 0%, rgba(10,15,36,0.9) 100%);
            border-bottom: 2px solid var(--ouro-real);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .btn-voltar-jogo {
            background: linear-gradient(135deg, #555f8a, #3a4264);
            border: 2px solid var(--ouro-real);
            padding: 8px 20px;
            border-radius: 50px;
            color: var(--dourado-branco);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-voltar-jogo:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #6a759e, #4a5270);
        }
        
        .progress-container {
            margin: 15px 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 50px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .progress-text {
            font-size: 18px;
            font-weight: bold;
            color: var(--ouro-real);
        }
        
        .progress-bar {
            flex: 1;
            height: 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            min-width: 150px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--verde-dragao), var(--lime));
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 12px;
            max-width: 95%;
            margin: 20px auto;
            background: rgba(0,0,0,0.4);
            padding: 25px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }
        
        .number-cell {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            transition: all 0.3s;
            border: 2px solid rgba(255,255,255,0.15);
        }
        
        .number-cell.completed {
            background: var(--verde-dragao);
            color: white;
            transform: scale(0.95);
            border-color: var(--ouro-real);
        }
        
        .number-cell.current {
            background: var(--ouro-real);
            color: #1a0a2e;
            transform: scale(1.08);
            box-shadow: 0 0 20px rgba(212,168,67,0.6);
            border: 3px solid white;
        }
        
        .number-cell input {
            width: 100%;
            height: 100%;
            text-align: center;
            background: transparent;
            border: none;
            font-size: 32px;
            font-weight: bold;
            color: #1a0a2e;
            outline: none;
            border-radius: 15px;
            font-family: 'Nunito', sans-serif;
        }
        
        .number-cell.error {
            background: var(--fogo);
            animation: shake 0.3s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        
        /* Área do Dragão e Caverna - TEMA CENTRAL MAIOR */
        .dragons-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px;
            margin: 20px 30px;
            background: rgba(0,0,0,0.4);
            border-radius: 80px;
            position: relative;
            border: 2px solid rgba(212,168,67,0.3);
        }
        
        .dragon-player {
            position: relative;
            transition: margin-left 0.7s ease-out;
            z-index: 5;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.3));
        }
        
        .dragon-player img {
            width: 110px;
            height: auto;
            animation: floatDragon 2s ease-in-out infinite;
        }
        
        @keyframes floatDragon {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        
        .dragon-cave {
            text-align: center;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.3));
        }
        
        .cave-img {
            width: 130px;
            height: auto;
            animation: floatCave 2.5s ease-in-out infinite;
        }
        
        @keyframes floatCave {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }
        
        .path-line {
            position: absolute;
            top: 50%;
            left: 12%;
            right: 12%;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            transform: translateY(-50%);
            z-index: 0;
        }
        
        .path-fill {
            position: absolute;
            top: 50%;
            left: 12%;
            height: 10px;
            background: linear-gradient(90deg, var(--verde-dragao), var(--lime));
            border-radius: 10px;
            transform: translateY(-50%);
            transition: width 0.5s ease;
            z-index: 1;
            box-shadow: 0 0 10px rgba(45,142,95,0.5);
        }
        
        .mom-dragon {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            background: rgba(0,0,0,0.6);
            padding: 5px 15px;
            border-radius: 50px;
            white-space: nowrap;
            color: var(--ouro-real);
            font-weight: bold;
        }
        
        .victory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .victory-card {
            background: linear-gradient(135deg, var(--noite-mid), var(--noite-bottom));
            border: 3px solid var(--ouro-real);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        
        .victory-card h2 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 36px;
            color: var(--ouro-real);
            margin-bottom: 15px;
        }
        
        .btn-reiniciar {
            background: linear-gradient(135deg, var(--verde-dragao), var(--verde-escuro));
            border: none;
            padding: 14px 35px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s;
        }
        
        .btn-reiniciar:hover { transform: scale(1.05); }
        
        .decoracao {
            text-align: center;
            margin-top: 30px;
            font-size: 24px;
            opacity: 0.4;
            letter-spacing: 12px;
        }
        
        @media (max-width: 768px) {
            .numbers-grid { gap: 6px; padding: 15px; }
            .number-cell { font-size: 18px; }
            .number-cell input { font-size: 20px; }
            .dragons-area { padding: 20px; margin: 10px 15px; }
            .dragon-player img { width: 70px; }
            .cave-img { width: 80px; }
            .progress-text { font-size: 14px; }
            .path-line, .path-fill { left: 15%; right: 15%; }
            .mom-dragon { font-size: 10px; white-space: normal; text-align: center; width: 120px; bottom: -30px; }
        }
        
        @media (max-width: 480px) {
            .numbers-grid { gap: 4px; padding: 10px; }
            .number-cell { font-size: 14px; }
            .number-cell input { font-size: 16px; }
            .dragons-area { flex-direction: column; gap: 20px; }
            .path-line, .path-fill { display: none; }
            .dragon-player { margin-left: 0 !important; }
            .progress-container { flex-direction: column; }
        }
        
        .container::-webkit-scrollbar {
            width: 4px;
        }
        
        .container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        
        .container::-webkit-scrollbar-thumb {
            background: var(--ouro-real);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="elementos-container"></div>

    <header class="header">
        <div class="header-inner">
            <div class="header-botoes">
                <button class="btn-musica" id="btnMusica" title="Música de fundo">🎵</button>
                <button class="btn-fullscreen" id="btnFullscreen" title="Tela Cheia">⛶</button>
            </div>
            <a href="index.html" class="btn-voltar-dourado">← ✨ Voltar ao Reino ✨</a>
        </div>
    </header>

    <div class="container" id="mainContainer">
        <h1 class="titulo-reino">🐉 Trilha dos Números</h1>
        <p class="subtitulo-magico">Ajude o dragãozinho a chegar até a mamãe! 🏰✨</p>
        
        <div class="fases-grid" id="fasesGrid">
            <!-- Fases serão geradas via JS -->
        </div>
        
        <div class="decoracao">🐉 🗺️ 🔢 🏆 🐲</div>
    </div>

    <script>
        // ========== CONFIGURAÇÕES DAS FASES ==========
        const GAME_PHASES = [
            { id: 1, start: 0, end: 49, bg: 'fundo1.jpg', dragonStatic: 'dragao1.png', dragonGif: 'dragao1.gif', color: 'linear-gradient(145deg, #4dd0e1, #26a8b8)' },
            { id: 2, start: 50, end: 99, bg: 'fundo2.jpg', dragonStatic: 'dragao2.png', dragonGif: 'dragao2.gif', color: 'linear-gradient(145deg, #1e5f8e, #0d3a5c)' },
            { id: 3, start: 100, end: 149, bg: 'fundo3.jpg', dragonStatic: 'dragao3.png', dragonGif: 'dragao3.gif', color: 'linear-gradient(145deg, #b39ddb, #8e79c0)' },
            { id: 4, start: 150, end: 199, bg: 'fundo4.jpg', dragonStatic: 'dragao4.png', dragonGif: 'dragao4.gif', color: 'linear-gradient(145deg, #e91e8c, #9c1460)' },
            { id: 5, start: 200, end: 249, bg: 'fundo5.jpg', dragonStatic: 'dragao5.png', dragonGif: 'dragao5.gif', color: 'linear-gradient(145deg, #ff6b35, #e05a2a)' },
            { id: 6, start: 250, end: 299, bg: 'fundo6.jpg', dragonStatic: 'dragao6.png', dragonGif: 'dragao6.gif', color: 'linear-gradient(145deg, #f5c64a, #b9852f)' }
        ];

        // ========== SPEECH SYNTHESIS PARA FALAR OS NÚMEROS ==========
        let speechSynthesisSupported = 'speechSynthesis' in window;
        
        function falarNumero(numero) {
            if (!speechSynthesisSupported) return;
            
            // Cancela qualquer fala em andamento
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(String(numero));
            utterance.lang = 'pt-BR';
            utterance.rate = 0.9;
            utterance.pitch = 1.1;
            utterance.volume = 1;
            
            // Tenta usar uma voz feminina (mais agradável para crianças)
            const vozes = window.speechSynthesis.getVoices();
            const vozPtBr = vozes.find(v => v.lang === 'pt-BR' && v.name.includes('Maria'));
            if (vozPtBr) utterance.voice = vozPtBr;
            
            window.speechSynthesis.speak(utterance);
        }

        // ========== ÁUDIO E CONFIGURAÇÕES ==========
        let musicaFundo = null;
        let musicaAtiva = false;
        let audioAtivado = false;
        let somAtual = null;
        let faseAtiva = null;
        
        function tocarSom(arquivo) {
            if (!audioAtivado) return;
            if (!arquivo) return;
            try {
                if (somAtual) {
                    somAtual.pause();
                    somAtual.currentTime = 0;
                }
                somAtual = new Audio(arquivo);
                somAtual.play().catch(e => console.log('Áudio:', e));
            } catch(e) { console.log('Erro no áudio:', e); }
        }
        
        function ativarSons() {
            if (audioAtivado) return;
            audioAtivado = true;
            confetti({ particleCount: 80, spread: 70, origin: { y: 0.5 }, colors: ['#d4a843', '#fff', '#ff6b35'] });
        }
        
        function toggleMusica() {
            if (!audioAtivado) {
                ativarSons();
                setTimeout(toggleMusica, 100);
                return;
            }
            const btn = document.getElementById('btnMusica');
            if (!musicaFundo) {
                musicaFundo = new Audio('som.mp3');
                musicaFundo.loop = true;
                musicaFundo.volume = 0.3;
            }
            if (musicaAtiva) {
                musicaFundo.pause();
                musicaAtiva = false;
                btn.classList.remove('ativo');
                btn.innerHTML = '🎵';
            } else {
                musicaFundo.play().catch(e => console.log('Música:', e));
                musicaAtiva = true;
                btn.classList.add('ativo');
                btn.innerHTML = '🎵';
            }
        }
        
        // ========== FUNÇÕES DO JOGO ==========
        function iniciarFase(phaseIndex) {
            const phase = GAME_PHASES[phaseIndex];
            faseAtiva = phaseIndex;
            const totalNumbers = phase.end - phase.start + 1;
            const numbers = Array.from({ length: totalNumbers }, (_, i) => phase.start + i);
            
            let currentIndex = 0;
            let inputValues = {};
            let isVictory = false;
            
            function renderGame() {
                const container = document.getElementById('mainContainer');
                const progressPercent = (currentIndex / totalNumbers) * 100;
                const isNearEnd = progressPercent > 80;
                const houseImage = isNearEnd ? 'casa2.gif' : 'casa.gif';
                
                let numbersGridHtml = '';
                numbers.forEach((num, idx) => {
                    const isCompleted = idx < currentIndex;
                    const isCurrent = idx === currentIndex;
                    
                    numbersGridHtml += `
                        <div class="number-cell ${isCompleted ? 'completed' : ''} ${isCurrent ? 'current' : ''}">
                            ${isCompleted ? num : (isCurrent ? `<input type="text" id="currentInput" placeholder="?" inputmode="numeric" style="color: #1a0a2e;">` : '?')}
                        </div>
                    `;
                });
                
                container.innerHTML = `
                    <div class="game-area">
                        <div class="game-header">
                            <div class="header-botoes">
                                <button class="btn-musica" id="btnMusicaGame" style="background: linear-gradient(135deg, var(--verde-dragao), var(--verde-escuro)); border: 2px solid var(--ouro-real); width: 42px; height: 42px; border-radius: 50%; cursor: pointer; font-size: 18px; color: white;">🎵</button>
                                <button class="btn-fullscreen" id="btnFullscreenGame" style="background: linear-gradient(135deg, #4a148c, #6a1b9a); border: 2px solid var(--ouro-real); width: 42px; height: 42px; border-radius: 50%; cursor: pointer; font-size: 20px; color: white;">⛶</button>
                            </div>
                            <button class="btn-voltar-jogo" id="btnVoltarMenu">← Voltar ao Menu</button>
                        </div>
                        
                        <div class="dragons-area">
                            <div class="path-line"></div>
                            <div class="path-fill" style="width: ${progressPercent}%"></div>
                            
                            <div class="dragon-player" style="margin-left: ${Math.min(progressPercent, 85)}%;">
                                <img src="${phase.dragonGif}" alt="Dragão Filhote" onerror="this.src='dragao1.gif'">
                                <div class="mom-dragon" style="bottom: -30px;">🐉 Filhote</div>
                            </div>
                            
                            <div class="dragon-cave">
                                <img src="${houseImage}" alt="Caverna da Mamãe" class="cave-img" onerror="this.src='casa.gif'">
                                <div class="mom-dragon">🐲 Mamãe Dragão</div>
                            </div>
                        </div>
                        
                        <div class="progress-container">
                            <span class="progress-text">📊 Progresso: ${currentIndex}/${totalNumbers}</span>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progressPercent}%"></div>
                            </div>
                            <span class="progress-text">⭐ ${Math.floor((currentIndex / totalNumbers) * 100)}%</span>
                        </div>
                        
                        <div class="numbers-grid" style="grid-template-columns: repeat(10, 1fr);">
                            ${numbersGridHtml}
                        </div>
                    </div>
                `;
                
                // Conectar eventos
                const inputElement = document.getElementById('currentInput');
                if (inputElement && !isVictory) {
                    inputElement.focus();
                    inputElement.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            const val = parseInt(e.target.value);
                            const targetNumber = numbers[currentIndex];
                            if (!isNaN(val) && val === targetNumber) {
                                // 🔥 FALA O NÚMERO CORRETO!
                                falarNumero(targetNumber);
                                tocarSom('acerto.ogg');
                                inputValues[currentIndex] = val;
                                currentIndex++;
                                if (currentIndex >= totalNumbers) {
                                    finishLevel();
                                } else {
                                    renderGame();
                                }
                            } else if (e.target.value.length >= String(targetNumber).length) {
                                const cell = document.querySelector('.number-cell.current');
                                cell.classList.add('error');
                                setTimeout(() => cell.classList.remove('error'), 300);
                                tocarSom('erro.ogg');
                                e.target.value = '';
                            }
                        }
                    });
                }
                
                document.getElementById('btnVoltarMenu').onclick = () => {
                    faseAtiva = null;
                    carregarMenu();
                };
                document.getElementById('btnMusicaGame').onclick = toggleMusica;
                document.getElementById('btnFullscreenGame').onclick = toggleFullscreen;
            }
            
            function finishLevel() {
                isVictory = true;
                falarNumero("Parabéns! Você completou a fase!");
                tocarSom('fim_jogo.ogg');
                confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 }, colors: ['#d4a843', '#ff6b35', '#2d8e5f', '#fff'] });
                
                const container = document.getElementById('mainContainer');
                container.innerHTML = `
                    <div class="game-area">
                        <div class="game-header">
                            <div class="header-botoes">
                                <button class="btn-musica" id="btnMusicaGame" style="background: linear-gradient(135deg, var(--verde-dragao), var(--verde-escuro)); border: 2px solid var(--ouro-real); width: 42px; height: 42px; border-radius: 50%; cursor: pointer; font-size: 18px; color: white;">🎵</button>
                                <button class="btn-fullscreen" id="btnFullscreenGame" style="background: linear-gradient(135deg, #4a148c, #6a1b9a); border: 2px solid var(--ouro-real); width: 42px; height: 42px; border-radius: 50%; cursor: pointer; font-size: 20px; color: white;">⛶</button>
                            </div>
                            <button class="btn-voltar-jogo" id="btnVoltarMenu">← Voltar ao Menu</button>
                        </div>
                        
                        <div class="victory-overlay" style="position: relative; background: rgba(0,0,0,0.95);">
                            <div class="victory-card">
                                <span style="font-size: 70px;">🏆🐉✨</span>
                                <h2>Parabéns!</h2>
                                <p style="font-size: 20px; margin: 15px 0;">Você completou a <strong>Fase ${phase.id}</strong>!</p>
                                <p style="font-size: 18px;">O dragãozinho encontrou a mamãe!</p>
                                <button class="btn-reiniciar" id="btnReiniciar">🐲 Jogar Novamente</button>
                                <button class="btn-reiniciar" id="btnVoltarFases" style="background: var(--ouro-real); margin-top: 10px; color: #1a0a2e;">✨ Voltar às Fases ✨</button>
                            </div>
                        </div>
                    </div>
                `;
                
                document.getElementById('btnVoltarMenu').onclick = () => {
                    faseAtiva = null;
                    carregarMenu();
                };
                document.getElementById('btnReiniciar').onclick = () => iniciarFase(phaseIndex);
                document.getElementById('btnVoltarFases').onclick = () => {
                    faseAtiva = null;
                    carregarMenu();
                };
                document.getElementById('btnMusicaGame').onclick = toggleMusica;
                document.getElementById('btnFullscreenGame').onclick = toggleFullscreen;
            }
            
            renderGame();
        }
        
        function carregarMenu() {
            const container = document.getElementById('mainContainer');
            let fasesHtml = '';
            
            GAME_PHASES.forEach((phase, index) => {
                const isDesafio = phase.id >= 4;
                fasesHtml += `
                    <div class="card-fase" data-fase="${index}" style="background: ${phase.color};">
                        ${isDesafio ? '<div class="badge-desafio">🔥 Modo Desafio</div>' : ''}
                        <span class="emoji-fase">${isDesafio ? '🐲⚡' : '🐉✨'}</span>
                        <div class="numero-fase">Fase ${phase.id}</div>
                        <div class="range-fase">${phase.start} até ${phase.end}</div>
                    </div>
                `;
            });
            
            container.innerHTML = `
                <h1 class="titulo-reino">🐉 Trilha dos Números</h1>
                <p class="subtitulo-magico">Ajude o dragãozinho a chegar até a mamãe! 🏰✨</p>
                
                <div class="fases-grid" id="fasesGrid">
                    ${fasesHtml}
                </div>
                
                <div class="decoracao">🐉 🗺️ 🔢 🏆 🐲</div>
            `;
            
            document.querySelectorAll('.card-fase').forEach(card => {
                card.addEventListener('click', () => {
                    const faseIndex = parseInt(card.getAttribute('data-fase'));
                    iniciarFase(faseIndex);
                });
                card.addEventListener('mouseenter', () => tocarSom(`fase_${card.getAttribute('data-fase')}.mp3`));
            });
        }
        
        // ========== FULLSCREEN ==========
        const FS_KEY = 'reinoFullscreen';
        
        function isFullscreen() {
            return !!(document.fullscreenElement || document.webkitFullscreenElement);
        }
        
        function enterFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen().catch(() => {});
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        }
        
        function exitFullscreen() {
            if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
        
        function toggleFullscreen() {
            if (isFullscreen()) {
                exitFullscreen();
                localStorage.setItem(FS_KEY, 'false');
            } else {
                enterFullscreen();
                localStorage.setItem(FS_KEY, 'true');
            }
            atualizarIconeFullscreen();
        }
        
        function atualizarIconeFullscreen() {
            const btns = document.querySelectorAll('.btn-fullscreen');
            btns.forEach(btn => {
                if (isFullscreen()) {
                    btn.innerHTML = '✖';
                    btn.classList.add('ativo');
                } else {
                    btn.innerHTML = '⛶';
                    btn.classList.remove('ativo');
                }
            });
        }
        
        function setupFullscreenListeners() {
            const events = ['fullscreenchange', 'webkitfullscreenchange'];
            events.forEach(event => {
                document.addEventListener(event, () => {
                    atualizarIconeFullscreen();
                    if (!isFullscreen()) localStorage.setItem(FS_KEY, 'false');
                });
            });
        }
        
        function restaurarFullscreen() {
            const deveFullscreen = localStorage.getItem(FS_KEY) === 'true';
            if (deveFullscreen && !isFullscreen()) {
                setTimeout(() => enterFullscreen(), 100);
            }
            atualizarIconeFullscreen();
        }
        
        // Carregar vozes para o Speech Synthesis
        if (speechSynthesisSupported) {
            window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
            };
        }
        
        // ========== ELEMENTOS FLUTUANTES ==========
        function criarElementosFlutuantes() {
            const container = document.getElementById('elementos-container');
            const elementos = ['🐉', '🐲', '✨', '🌟', '🔢', '🥚', '💎', '🏆'];
            const cores = ['#d4a843', '#ff6b35', '#2d8e5f', '#b39ddb', '#f5c64a'];
            
            function adicionarElemento() {
                const c = document.createElement('div');
                c.className = 'elemento-flutuante';
                c.innerText = elementos[Math.floor(Math.random() * elementos.length)];
                c.style.left = Math.random() * 100 + '%';
                c.style.fontSize = (Math.random() * 20 + 14) + 'px';
                c.style.color = cores[Math.floor(Math.random() * cores.length)];
                c.style.animationDuration = (Math.random() * 7 + 5) + 's';
                container.appendChild(c);
                setTimeout(() => c.remove(), 12000);
            }
            
            for (let i = 0; i < 18; i++) {
                setTimeout(adicionarElemento, i * 400);
            }
            setInterval(adicionarElemento, 3000);
        }
        
        // ========== INICIALIZAÇÃO ==========
        window.onload = function() {
            criarElementosFlutuantes();
            setupFullscreenListeners();
            restaurarFullscreen();
            carregarMenu();
            
            document.getElementById('btnMusica').addEventListener('click', toggleMusica);
            document.getElementById('btnFullscreen').addEventListener('click', toggleFullscreen);
            
            const ativarPrimeiraInteracao = () => {
                if (!audioAtivado) ativarSons();
                document.removeEventListener('click', ativarPrimeiraInteracao);
                document.removeEventListener('touchstart', ativarPrimeiraInteracao);
            };
            document.addEventListener('click', ativarPrimeiraInteracao);
            document.addEventListener('touchstart', ativarPrimeiraInteracao);
            
            setTimeout(() => {
                confetti({ particleCount: 50, spread: 70, origin: { y: 0.6 }, colors: ['#d4a843', '#ff6b35', '#2d8e5f'] });
            }, 500);
        };
    </script>
</body>
</html>
